*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:#f2f2f7;min-height:100vh}
body.dark{background:#1c1c1e;color:#fff}

/* HEADER */

/* PLAN SWITCHER */

/* MAIN */

/* BOTTOM TABS */

// ── GOOGLE SHEETS CONFIG ────────────────────────────────────────
// 1. Vlož sem URL z Google Apps Script po nasadení (Deploy → Web App URL)
var SHEETS_URL = 'https://script.google.com/macros/s/AKfycbw94iRNDPR4ZmFqbgzlv-dzzCieeR4LNLN-UZHgSRgIHtmnABsL-H_EDkxkxWuTZIRF/exec';

// ── SHEETS API ───────────────────────────────────────────────────
function sheetsRequest(params, cb) {
  if (!SHEETS_URL) { if(cb) cb(null); return; }
  var cbName = 'gs_cb_' + Date.now();
  var script = document.createElement('script');
  params.callback = cbName;
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  }).join('&');
  window[cbName] = function(data) {
    if(cb) cb(data);
    delete window[cbName];
    try { document.body.removeChild(script); } catch(e) {}
  };
  script.src = SHEETS_URL + '?' + qs;
  script.onerror = function() { if(cb) cb(null); delete window[cbName]; };
  document.body.appendChild(script);
}

function syncToSheets(planName, cvidNazov, record, cb) {
  if (!SHEETS_URL || !navigator.onLine) { if(cb) cb(); return; }
  sheetsRequest({
    action: 'save',
    sheet: 'Záznamy',
    id: record._id || Date.now(),
    plan: planName,
    cvik: cvidNazov,
    datum: record.datum,
    vaha: record.vaha,
    opak: record.opak || '',
    serie: record.serie || 1,
    note: record.note || ''
  }, function(res) {
    if(cb) cb(res);
  });
}

function loadFromSheets(cb) {
  if (!SHEETS_URL || !navigator.onLine) { if(cb) cb([]); return; }
  sheetsRequest({ action: 'loadRecords', sheet: 'Záznamy' }, function(res) {
    if(res && res.status === 'ok') {
      if(cb) cb(res.records || []);
    } else {
      if(cb) cb([]);
    }
  });
}

// Offline queue pre Sheets
var sheetsQueue = [];
try { sheetsQueue = JSON.parse(localStorage.getItem('sheetsQueue') || '[]'); } catch(e) {}

function flushSheetsQueue() {
  if (!navigator.onLine || !SHEETS_URL || sheetsQueue.length === 0) return;
  setStatus('🔄 Synchronizujem ' + sheetsQueue.length + ' záznamy...');
  var q = sheetsQueue.slice();
  sheetsQueue = [];
  localStorage.setItem('sheetsQueue', '[]');
  q.forEach(function(item) {
    syncToSheets(item.plan, item.cvik, item.record);
  });
  setTimeout(function() { setStatus('✅ Synchronizované!'); }, 1500);
}

window.addEventListener('online', function() {
  setTimeout(flushSheetsQueue, 1000);
});

// ── STORAGE ──────────────────────────────────────────────────────
function storeKey(planIdx, cvidId){ return 'trening_' + planIdx + '_' + cvidId; }

function loadHistoria(planIdx, cvidId){
  // Zlúčiť zabudovanú históriu s localStorage
  var base = (PLANS[planIdx].cviky.find(function(c){return c.id===cvidId;})||{}).historia || [];
  try{
    var saved = JSON.parse(localStorage.getItem(storeKey(planIdx, cvidId)) || '[]');
    // Zlúč - saved záznamy majú _saved flag
    var all = base.concat(saved.filter(function(s){return s._saved;}));
    return all.sort(function(a,b){return a.datum.localeCompare(b.datum);});
  }catch(e){ return base; }
}

function saveRecord(planIdx, cvidId, record){
  var saved = [];
  try{ saved = JSON.parse(localStorage.getItem(storeKey(planIdx, cvidId)) || '[]'); }catch(e){}
  record._saved = true;
  record._id = Date.now();
  saved.push(record);
  localStorage.setItem(storeKey(planIdx, cvidId), JSON.stringify(saved));
}

function deleteRecord(planIdx, cvidId, id){
  var saved = [];
  try{ saved = JSON.parse(localStorage.getItem(storeKey(planIdx, cvidId)) || '[]'); }catch(e){}
  saved = saved.filter(function(s){ return s._id !== id; });
  localStorage.setItem(storeKey(planIdx, cvidId), JSON.stringify(saved));
  // Ak je to zabudovaný záznam, ulož ho do "deleted"
  var deleted = [];
  try{ deleted = JSON.parse(localStorage.getItem('deleted_' + storeKey(planIdx, cvidId)) || '[]'); }catch(e){}
  deleted.push(id);
  localStorage.setItem('deleted_' + storeKey(planIdx, cvidId), JSON.stringify(deleted));
}

// ── UI POMOCNÉ ───────────────────────────────────────────────────
function setStatus(msg){
  var s = document.getElementById('statusBar');
  if(s){ s.textContent = msg; setTimeout(function(){ s.textContent = ''; }, 2500); }
}

function toggleDark(){
  darkMode = !darkMode;
  document.body.classList.toggle('dark', darkMode);
  document.getElementById('darkBtn').textContent = darkMode ? '☀️' : '🌙';
  localStorage.setItem('darkMode', darkMode ? '1' : '0');
}

function setPlan(idx){
  currentPlan = idx;
  [0,1].forEach(function(i){
    document.getElementById('planBtn'+i).className = 'plan-btn' + (i===idx?' active':'');
  });
  renderCviky();
}

function switchTab(tab){
  currentTab = tab;
  ['cviky','historia','stats'].forEach(function(t){
    document.getElementById('view'+t.charAt(0).toUpperCase()+t.slice(1)).className = 'view' + (t===tab?' show':'');
    document.getElementById('tab-'+t).className = 'btab' + (t===tab?' active':'');
  });
  if(tab==='historia') renderHistoria();
  if(tab==='stats') renderStats();
}

// ── CVIKY ZOZNAM ─────────────────────────────────────────────────
function renderCviky(){
  var plan = PLANS[currentPlan];
  var list = document.getElementById('cvikyList');
  if(!list) return;
  list.innerHTML = '';

  plan.cviky.forEach(function(cvik, idx){
    var hist = loadHistoria(currentPlan, cvik.id);
    var lastEntry = hist.length > 0 ? hist[hist.length-1] : null;

    var card = document.createElement('div');
    card.className = 'cvik-card' + (hist.length > 0 ? ' has-data' : '');

    var rightHtml = lastEntry
      ? '<div class="cvik-last-weight">' + lastEntry.vaha + ' kg</div><div class="cvik-last-date">' + formatDatum(lastEntry.datum) + '</div>'
      : '<div class="cvik-no-data">—</div>';

    // Minibar graf (posledných 5 tréningov)
    var minibar = '';
    if(hist.length > 1){
      var last5 = hist.slice(-5);
      var maxW = Math.max.apply(null, last5.map(function(h){return h.vaha;}));
      minibar = '<div class="minibars" style="margin-top:8px">' +
        last5.map(function(h){
          var pct = maxW > 0 ? Math.round(h.vaha/maxW*100) : 0;
          return '<div class="minibar-col"><div style="flex:1;display:flex;align-items:flex-end;width:100%"><div class="minibar-fill" style="height:'+pct+'%"></div></div><div class="minibar-label">'+h.vaha+'</div></div>';
        }).join('') + '</div>';
    }

    card.innerHTML =
      '<div class="cvik-header">' +
        '<div><div class="cvik-name">' + cvik.nazov + '</div><div class="cvik-meta">Tempo: ' + cvik.tempo + ' · ' + cvik.serie + ' séria</div></div>' +
        '<div class="cvik-right">' + rightHtml + '</div>' +
      '</div>' + minibar;

    card.onclick = function(){ openDetail(idx); };
    list.appendChild(card);
  });
}

function formatDatum(d){
  var parts = d.split('-');
  if(parts.length === 3) return parts[2]+'.'+parts[1]+'.'+parts[0];
  return d;
}

// ── DETAIL CVIKU ─────────────────────────────────────────────────
var detailChart = null;

function openDetail(cvidIdx){
  var cvik = PLANS[currentPlan].cviky[cvidIdx];
  currentCvik = {planIdx: currentPlan, cvidIdx: cvidIdx, cvik: cvik};

  document.getElementById('detailTitle').textContent = cvik.nazov;

  var videoBtn = document.getElementById('videoBtnDetail');
  if(cvik.video && cvik.video.length > 0){
    videoBtn.className = 'video-btn show';
  } else {
    videoBtn.className = 'video-btn';
  }

  document.getElementById('detailScreen').className = 'detail-screen show';
  renderDetail();
}

function openVideo(){
  if(currentCvik && currentCvik.cvik.video){
    window.open(currentCvik.cvik.video, '_blank');
  }
}

function closeDetail(){
  document.getElementById('detailScreen').className = 'detail-screen';
  if(detailChart){ detailChart.destroy(); detailChart = null; }
  currentCvik = null;
  renderCviky();
}

function renderDetail(){
  if(!currentCvik) return;
  var cvik = currentCvik.cvik;
  var planIdx = currentCvik.planIdx;
  var hist = loadHistoria(planIdx, cvik.id);
  var body = document.getElementById('detailBody');
  if(!body) return;
  body.innerHTML = '';

  // Graf progresu
  if(hist.length > 1){
    var chartWrap = document.createElement('div');
    chartWrap.className = 'chart-wrap';
    chartWrap.innerHTML = '<div class="chart-title">Progres váhy (kg)</div><div class="chart-canvas-wrap"><canvas id="progressChart"></canvas></div>';
    body.appendChild(chartWrap);

    setTimeout(function(){
      var ctx = document.getElementById('progressChart');
      if(!ctx) return;
      if(detailChart){ detailChart.destroy(); }
      var labels = hist.map(function(h){ return formatDatum(h.datum); });
      var data = hist.map(function(h){ return h.vaha; });
      detailChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Váha (kg)',
            data: data,
            borderColor: '#FF3B30',
            backgroundColor: 'rgba(255,59,48,0.1)',
            borderWidth: 2.5,
            pointBackgroundColor: '#FF3B30',
            pointRadius: 4,
            tension: 0.3,
            fill: true
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { font: { size: 10 }, maxRotation: 45 }, grid: { display: false } },
            y: { ticks: { font: { size: 11 } } }
          }
        }
      });
    }, 50);
  }

  // Info o cviku - tempo a serie
  var infoBox = document.createElement('div');
  infoBox.style.cssText = 'background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;gap:12px;';
  infoBox.className = darkMode ? 'zapis-card' : 'zapis-card';

  var tempoExplain = '';
  var tp = (cvik.tempo || '').trim();
  if(tp) {
    var parts = tp.split('-');
    var labels = ['Excentrická', 'Prestávka dole', 'Koncentrická', 'Prestávka hore'];
    tempoExplain = parts.map(function(p,i){ return '<div style="text-align:center;flex:1"><div style="font-size:20px;font-weight:700;color:#FF3B30">'+p+'</div><div style="font-size:10px;color:#8e8e93;margin-top:2px">'+labels[i]+'</div></div>'; }).join('<div style="color:#e5e5ea;font-size:20px;align-self:center">·</div>');
  }

  infoBox.style.cssText = 'background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;gap:12px;';
  infoBox.innerHTML =
    '<div style="flex:1;min-width:0">' +
      '<div style="font-size:11px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Tempo</div>' +
      '<div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">' + tempoExplain + '</div>' +
      '<div style="font-size:10px;color:#c7c7cc;margin-top:6px">X = explozívny pohyb</div>' +
    '</div>' +
    '<div style="width:1px;background:#f2f2f7;flex-shrink:0"></div>' +
    '<div style="width:60px;flex-shrink:0;text-align:center">' +
      '<div style="font-size:11px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Séria</div>' +
      '<div style="font-size:32px;font-weight:700;color:#FF3B30;line-height:1">' + (cvik.serie || '1') + '</div>' +
      '<div style="font-size:11px;color:#8e8e93;margin-top:4px">série</div>' +
    '</div>';
  body.appendChild(infoBox);

  // Zápis nového tréningu
  var zapCard = document.createElement('div');
  zapCard.className = 'zapis-card';
  var today = new Date().toISOString().slice(0,10);
  var lastVaha = hist.length > 0 ? hist[hist.length-1].vaha : '';
  var lastOpak = hist.length > 0 ? hist[hist.length-1].opak : '';
  var lastSerie = hist.length > 0 ? hist[hist.length-1].serie : (cvik.serie || 1);

  zapCard.innerHTML =
    '<div class="zapis-title">Zapísať tréning</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">' +
      '<div class="form-col" style="grid-column:1/-1"><div class="form-label">Dátum</div><input type="date" class="form-date" id="zapDatum" value="' + today + '"></div>' +
      '<div class="form-col"><div class="form-label">Váha (kg)</div><input type="number" class="form-input" id="zapVaha" value="' + lastVaha + '" step="0.5" min="0" inputmode="decimal"></div>' +
      '<div class="form-col"><div class="form-label">Opakovania</div><input type="number" class="form-input" id="zapOpak" value="' + lastOpak + '" min="0" inputmode="numeric"></div>' +
      '<div class="form-col"><div class="form-label">Séria</div><input type="number" class="form-input" id="zapSerie" value="' + lastSerie + '" min="1" inputmode="numeric"></div>' +
    '</div>' +
    '<textarea class="note-input" id="zapNote" placeholder="Poznámka k tréningu..."></textarea>' +
    '<button class="save-btn" onclick="saveZapis()">💾 Uložiť</button>';
  body.appendChild(zapCard);

  // História
  if(hist.length > 0){
    var histTitle = document.createElement('div');
    histTitle.className = 'hist-section-title';
    histTitle.textContent = 'História (' + hist.length + ')';
    body.appendChild(histTitle);

    var histReversed = hist.slice().reverse();
    histReversed.forEach(function(h){
      var item = document.createElement('div');
      item.className = 'hist-item';
      var noteHtml = h.note ? '<div class="hist-note">📝 ' + h.note + '</div>' : '';
      var delHtml = h._saved ? '<button class="hist-del" onclick="deleteZapis(' + h._id + ')">×</button>' : '';
      item.innerHTML =
        '<div class="hist-left"><div class="hist-datum">' + formatDatum(h.datum) + '</div>' + noteHtml + '</div>' +
        '<div style="display:flex;align-items:center">' +
          '<div class="hist-right"><div class="hist-weight">' + h.vaha + ' kg</div><div class="hist-opak">' + (h.opak || '—') + ' opak · ' + (h.serie || 1) + ' série</div></div>' +
          delHtml +
        '</div>';
      body.appendChild(item);
    });
  } else {
    var empty = document.createElement('div');
    empty.className = 'hist-empty';
    empty.textContent = 'Zatiaľ žiadne záznamy. Zadaj prvý tréning! 💪';
    body.appendChild(empty);
  }
}

function saveZapis(){
  if(!currentCvik) return;
  var datum = document.getElementById('zapDatum').value;
  var vaha = parseFloat(document.getElementById('zapVaha').value);
  var opak = parseFloat(document.getElementById('zapOpak').value);
  var serie = parseFloat(document.getElementById('zapSerie').value) || 1;
  var note = document.getElementById('zapNote').value.trim();

  if(!datum || isNaN(vaha) || vaha <= 0){ setStatus('⚠️ Zadaj váhu!'); return; }

  var record = { datum: datum, vaha: vaha, opak: opak || null, serie: serie };
  if(note) record.note = note;

  saveRecord(currentCvik.planIdx, currentCvik.cvik.id, record);
  
  // Sync do Google Sheets
  var planName = PLANS[currentCvik.planIdx].plan;
  var cvidNazov = currentCvik.cvik.nazov;
  if (SHEETS_URL && navigator.onLine) {
    syncToSheets(planName, cvidNazov, record, function(res) {
      if(res && res.status === 'ok') {
        setStatus('✅ Uložené + zálohované do Sheets!');
      } else {
        setStatus('✅ Uložené lokálne (Sheets nedostupné)');
      }
    });
  } else if (SHEETS_URL && !navigator.onLine) {
    // Ulož do offline queue
    sheetsQueue.push({ plan: planName, cvik: cvidNazov, record: record });
    localStorage.setItem('sheetsQueue', JSON.stringify(sheetsQueue));
    setStatus('✅ Uložené lokálne (offline – sync neskôr)');
  } else {
    setStatus('✅ Uložené!');
  }

  if(detailChart){ detailChart.destroy(); detailChart = null; }
  renderDetail();
}

function deleteZapis(id){
  if(!currentCvik) return;
  deleteRecord(currentCvik.planIdx, currentCvik.cvik.id, id);
  if(detailChart){ detailChart.destroy(); detailChart = null; }
  renderDetail();
  setStatus('🗑️ Záznam vymazaný');
}

// ── HISTÓRIA TRÉNINGOV ───────────────────────────────────────────
function renderHistoria(){
  var list = document.getElementById('historiaList');
  if(!list) return;

  // Zbieraj všetky záznamy zo všetkých plánov a cvikov
  var allRecords = [];
  PLANS.forEach(function(plan, planIdx){
    plan.cviky.forEach(function(cvik){
      var hist = loadHistoria(planIdx, cvik.id);
      hist.forEach(function(h){
        allRecords.push({
          datum: h.datum,
          cvik: cvik.nazov,
          plan: plan.plan,
          vaha: h.vaha,
          opak: h.opak,
          note: h.note || ''
        });
      });
    });
  });

  // Zoraď podľa dátumu, zoskup po dňoch
  allRecords.sort(function(a,b){ return b.datum.localeCompare(a.datum); });

  var byDate = {};
  allRecords.forEach(function(r){
    if(!byDate[r.datum]) byDate[r.datum] = {plan: r.plan, items: []};
    byDate[r.datum].items.push(r);
  });

  list.innerHTML = '';
  var dates = Object.keys(byDate).sort().reverse();

  if(dates.length === 0){
    list.innerHTML = '<div class="hist-empty" style="padding:40px">Zatiaľ žiadne tréningy<br>Začni zapísať prvý! 💪</div>';
    return;
  }

  dates.forEach(function(datum){
    var day = byDate[datum];
    var item = document.createElement('div');
    item.className = 'trening-item';
    var cvikLines = day.items.map(function(r){
      return '• ' + r.cvik.slice(0,40) + (r.cvik.length>40?'...':'') + ' — <strong>' + r.vaha + 'kg</strong>' + (r.opak?' × '+r.opak:'');
    }).join('<br>');
    item.innerHTML =
      '<div class="trening-header"><div class="trening-datum">' + formatDatum(datum) + '</div><span class="trening-plan-badge">' + day.plan + '</span></div>' +
      '<div class="trening-cviky">' + cvikLines + '</div>';
    list.appendChild(item);
  });
}

// ── ŠTATISTIKY ───────────────────────────────────────────────────
function renderStats(){
  var list = document.getElementById('statsList');
  if(!list) return;

  var totalRecords = 0;
  var totalWeight = 0;
  var cvikyWithProgress = 0;
  var bestProgress = null;

  PLANS.forEach(function(plan, planIdx){
    plan.cviky.forEach(function(cvik){
      var hist = loadHistoria(planIdx, cvik.id);
      if(hist.length === 0) return;
      totalRecords += hist.length;
      hist.forEach(function(h){ totalWeight += h.vaha; });
      if(hist.length >= 2){
        cvikyWithProgress++;
        var progress = hist[hist.length-1].vaha - hist[0].vaha;
        if(!bestProgress || progress > bestProgress.val){
          bestProgress = { nazov: cvik.nazov, val: progress, plan: plan.plan };
        }
      }
    });
  });

  var treningDni = new Set();
  PLANS.forEach(function(plan, planIdx){
    plan.cviky.forEach(function(cvik){
      loadHistoria(planIdx, cvik.id).forEach(function(h){ treningDni.add(h.datum); });
    });
  });

  list.innerHTML = '';

  // Summary karty
  var grid = document.createElement('div');
  grid.className = 'stats-grid';
  grid.innerHTML = [
    {l:'Tréningové dni', v: treningDni.size, sub:'celkovo'},
    {l:'Zapísaných sérií', v: totalRecords, sub:'všetky plány'},
    {l:'Cviky s progresom', v: cvikyWithProgress, sub:'merané cviky'},
    {l:'Ø váha na cvik', v: totalRecords > 0 ? Math.round(totalWeight/totalRecords) + ' kg' : '—', sub:'priemer'}
  ].map(function(s){
    return '<div class="stat-card"><div class="stat-label">'+s.l+'</div><div class="stat-val">'+s.v+'</div><div class="stat-sub">'+s.sub+'</div></div>';
  }).join('');
  list.appendChild(grid);

  // Najlepší progres
  if(bestProgress){
    var bestCard = document.createElement('div');
    bestCard.className = 'zapis-card';
    bestCard.innerHTML = '<div class="zapis-title">🏆 Najlepší progres</div>' +
      '<div style="font-size:14px;font-weight:600;color:#1c1c1e;margin-bottom:4px">' + bestProgress.nazov + '</div>' +
      '<div style="font-size:22px;font-weight:700;color:#34C759">+' + bestProgress.val + ' kg</div>' +
      '<div style="font-size:12px;color:#8e8e93">' + bestProgress.plan + '</div>';
    list.appendChild(bestCard);
  }

  // Progres každého cviku
  PLANS.forEach(function(plan, planIdx){
    var planTitle = document.createElement('div');
    planTitle.className = 'hist-section-title';
    planTitle.style.marginBottom = '10px';
    planTitle.textContent = plan.plan;
    list.appendChild(planTitle);

    plan.cviky.forEach(function(cvik){
      var hist = loadHistoria(planIdx, cvik.id);
      if(hist.length === 0) return;
      var first = hist[0].vaha;
      var last = hist[hist.length-1].vaha;
      var diff = last - first;
      var diffStr = (diff >= 0 ? '+' : '') + diff + ' kg';
      var diffColor = diff > 0 ? '#34C759' : diff < 0 ? '#FF3B30' : '#8e8e93';

      var item = document.createElement('div');
      item.className = 'hist-item';
      item.innerHTML =
        '<div><div style="font-size:13px;font-weight:600;color:#1c1c1e">' + cvik.nazov.slice(0,40) + '</div><div style="font-size:11px;color:#8e8e93">' + hist.length + ' záz. · od '+first+' kg</div></div>' +
        '<div style="font-size:18px;font-weight:700;color:'+diffColor+'">'+diffStr+'</div>';
      list.appendChild(item);
    });
  });
}

// ── SYNC ZO SHEETS ───────────────────────────────────────────────
function syncFromSheets() {
  if (!SHEETS_URL) {
    setStatus('⚠️ Nastav SHEETS_URL v kóde!');
    return;
  }
  if (!navigator.onLine) {
    setStatus('⚠️ Offline – nie je možné načítať');
    return;
  }
  setStatus('🔄 Načítavam zo Sheets...');
  loadFromSheets(function(records) {
    if (!records || records.length === 0) {
      setStatus('ℹ️ Sheets prázdny alebo chyba');
      return;
    }
    // Ulož každý záznam do localStorage ak ho ešte nemáme
    var imported = 0;
    records.forEach(function(r) {
      // Nájdi cvik podľa názvu
      PLANS.forEach(function(plan, planIdx) {
        if (plan.plan !== r.plan) return;
        var cvik = plan.cviky.find(function(c){ return c.nazov === r.cvik; });
        if (!cvik) return;
        // Skontroluj či záznam už existuje
        var existing = [];
        try { existing = JSON.parse(localStorage.getItem(storeKey(planIdx, cvik.id)) || '[]'); } catch(e) {}
        var duplicate = existing.find(function(e){ return e.datum === r.datum && e.vaha == r.vaha; });
        if (!duplicate) {
          var rec = {
            datum: r.datum,
            vaha: parseFloat(r.vaha),
            opak: r.opak ? parseFloat(r.opak) : null,
            serie: r.serie ? parseFloat(r.serie) : 1,
            note: r.note || '',
            _saved: true,
            _id: r.id || Date.now() + Math.random()
          };
          existing.push(rec);
          localStorage.setItem(storeKey(planIdx, cvik.id), JSON.stringify(existing));
          imported++;
        }
      });
    });
    setStatus('✅ Načítané ' + imported + ' nových záznamov zo Sheets!');
    renderCviky();
    if (currentTab === 'historia') renderHistoria();
    if (currentTab === 'stats') renderStats();
  });
}

window.addEventListener('DOMContentLoaded', function(){
  // Dark mode
  var saved = localStorage.getItem('darkMode');
  if(saved === '1'){ darkMode = true; document.body.classList.add('dark'); document.getElementById('darkBtn').textContent = '☀️'; }
  renderCviky();
});
